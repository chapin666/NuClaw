# NuClaw 配置文件

# 服务器配置
server:
  host: "0.0.0.0"
  port: 8080
  workers: 4

# LLM 配置
llm:
  provider: "openai"
  api_key: "${OPENAI_API_KEY}"
  model: "gpt-4"
  timeout: 30
  temperature: 0.7
  max_tokens: 2000

# Agent 配置
agent:
  name: "NuClaw"
  welcome_message: "你好！我是 NuClaw AI 助手"
  max_history: 20

# 工具配置
tools:
  enabled:
    - weather
    - time
    - calculator
    - http_get
    - file
    - code_execute
    - knowledge_search

# RAG 配置
rag:
  enabled: true
  top_k: 3

# 日志配置
logging:
  level: "info"
  format: "json"
