apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nuclaw-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: nuclaw.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nuclaw
            port:
              number: 80
  tls:
  - hosts:
    - nuclaw.example.com
    secretName: nuclaw-tls
