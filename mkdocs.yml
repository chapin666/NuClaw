site_name: NuClaw - C++ AI Agent 教程
site_description: 用 C++17 从零构建 AI Agent —— 渐进式教程
site_author: NuClaw Authors
site_url: https://nuclaw-tutorial.github.io

repo_name: chapin666/NuClaw
repo_url: https://github.com/chapin666/NuClaw
edit_uri: edit/main/tutorials/

copyright: Copyright &copy; 2026 NuClaw Authors

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到亮色模式
  font:
    text: Roboto
    code: Roboto Mono
  favicon: assets/images/logo.svg
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

plugins:
  - search:
      separator: '[\s\u200b\-\.、]+'
  - minify:
      minify_html: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.keys
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
      title: 目录
  - tables
  - attr_list
  - md_in_html
  - def_list
  - pymdownx.arithmatex:
      generic: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/chapin666/NuClaw
    - icon: fontawesome/brands/docker
      link: https://hub.docker.com/r/nuclaw
  version:
    provider: mike

nav:
  - 首页: index.md
  
  - 第一部分：基础构建 (Step 0-5):
    - step00/tutorial.md
    - step01/tutorial.md
    - step02/tutorial.md
    - step03/tutorial.md
    - step04/tutorial.md
    - step05/tutorial.md
  
  - 第二部分：能力扩展 (Step 6-11):
    - step06/tutorial.md
    - step07/tutorial.md
    - step08/tutorial.md
    - step09/tutorial.md
    - step10/tutorial.md
    - step11/tutorial.md
  
  - 第三部分：产品化 (Step 12-16):
    - step12/tutorial.md
    - step13/tutorial.md
    - step14/tutorial.md
    - step15/tutorial.md
    - step16/tutorial.md
  
  - 第四部分：项目实战 (Step 17-19):
    - step17/tutorial.md
    - step18/tutorial.md
    - step19/tutorial.md
