<svg viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="320" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">SmartSupport 系统架构</text>
  
  <!-- Gateway Layer -->
  <rect x="50" y="55" width="700" height="70" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="80" y="75" font-size="13" font-weight="bold" fill="#1e40af">接入层 Gateway</text>
  
  <rect x="80" y="85" width="100" height="30" rx="4" fill="#fff" stroke="#60a5fa"/>
  <text x="130" y="104" text-anchor="middle" font-size="11" fill="#1e40af">WebSocket</text>
  
  <rect x="200" y="85" width="80" height="30" rx="4" fill="#fff" stroke="#60a5fa"/>
  <text x="240" y="104" text-anchor="middle" font-size="11" fill="#1e40af">HTTP</text>
  
  <rect x="300" y="85" width="90" height="30" rx="4" fill="#fff" stroke="#60a5fa"/>
  <text x="345" y="104" text-anchor="middle" font-size="11" fill="#1e40af">飞书 Bot</text>
  
  <rect x="410" y="85" width="90" height="30" rx="4" fill="#fff" stroke="#60a5fa"/>
  <text x="455" y="104" text-anchor="middle" font-size="11" fill="#1e40af">钉钉 Bot</text>
  
  <rect x="520" y="85" width="100" height="30" rx="4" fill="#fff" stroke="#60a5fa"/>
  <text x="570" y="104" text-anchor="middle" font-size="11" fill="#1e40af">Telegram</text>
  
  <rect x="640" y="85" width="90" height="30" rx="4" fill="#fff" stroke="#60a5fa"/>
  <text x="685" y="104" text-anchor="middle" font-size="11" fill="#1e40af">企业微信</text>
  
  <!-- Arrow Down -->
  <line x1="400" y1="125" x2="400" y2="140" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Service Layer -->
  <rect x="50" y="145" width="700" height="90" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="80" y="165" font-size="13" font-weight="bold" fill="#166534">服务层 Services</text>
  
  <rect x="80" y="175" width="95" height="45" rx="4" fill="#fff" stroke="#4ade80"/>
  <text x="127" y="195" text-anchor="middle" font-size="10" fill="#166534">Chat Service</text>
  <text x="127" y="210" text-anchor="middle" font-size="9" fill="#64748b">会话管理</text>
  
  <rect x="195" y="175" width="95" height="45" rx="4" fill="#fff" stroke="#4ade80"/>
  <text x="242" y="195" text-anchor="middle" font-size="10" fill="#166534">AI Service</text>
  <text x="242" y="210" text-anchor="middle" font-size="9" fill="#64748b">Agent+RAG</text>
  
  <rect x="310" y="175" width="95" height="45" rx="4" fill="#fff" stroke="#4ade80"/>
  <text x="357" y="195" text-anchor="middle" font-size="10" fill="#166534">Knowledge</text>
  <text x="357" y="210" text-anchor="middle" font-size="9" fill="#64748b">向量检索</text>
  
  <rect x="425" y="175" width="95" height="45" rx="4" fill="#fff" stroke="#4ade80"/>
  <text x="472" y="195" text-anchor="middle" font-size="10" fill="#166534">Human</text>
  <text x="472" y="210" text-anchor="middle" font-size="9" fill="#64748b">人工客服</text>
  
  <rect x="540" y="175" width="95" height="45" rx="4" fill="#fff" stroke="#4ade80"/>
  <text x="587" y="195" text-anchor="middle" font-size="10" fill="#166534">Tenant</text>
  <text x="587" y="210" text-anchor="middle" font-size="9" fill="#64748b">多租户</text>
  
  <rect x="655" y="175" width="85" height="45" rx="4" fill="#fff" stroke="#4ade80"/>
  <text x="697" y="195" text-anchor="middle" font-size="10" fill="#166534">Billing</text>
  <text x="697" y="210" text-anchor="middle" font-size="9" fill="#64748b">计费</text>
  
  <!-- Arrow Down -->
  <line x1="400" y1="235" x2="400" y2="250" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Data Layer -->
  <rect x="50" y="255" width="700" height="55" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="80" y="275" font-size="13" font-weight="bold" fill="#92400e">数据层 Data</text>
  
  <rect x="80" y="285" width="180" height="25" rx="4" fill="#fff" stroke="#fbbf24"/>
  <text x="170" y="302" text-anchor="middle" font-size="11" fill="#92400e">PostgreSQL + pgvector</text>
  
  <rect x="280" y="285" width="100" height="25" rx="4" fill="#fff" stroke="#fbbf24"/>
  <text x="330" y="302" text-anchor="middle" font-size="11" fill="#92400e">Redis</text>
  
  <rect x="400" y="285" width="100" height="25" rx="4" fill="#fff" stroke="#fbbf24"/>
  <text x="450" y="302" text-anchor="middle" font-size="11" fill="#92400e">MinIO</text>
  
  <!-- Arrow Marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>