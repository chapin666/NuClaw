<svg viewBox="0 0 750 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="750" height="200" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="375" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">NuClaw 学习路径</text>
  
  <!-- Part 1 -->
  <rect x="30" y="50" width="150" height="110" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="105" y="70" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">Part 1</text>
  <text x="105" y="88" text-anchor="middle" font-size="10" fill="#1e40af">基础构建</text>
  <text x="105" y="108" text-anchor="middle" font-size="9" fill="#64748b">Step 0-5</text>
  <text x="105" y="125" text-anchor="middle" font-size="9" fill="#64748b">网络编程</text>
  <text x="105" y="140" text-anchor="middle" font-size="9" fill="#64748b">Agent Loop</text>
  <text x="105" y="155" text-anchor="middle" font-size="9" fill="#64748b">LLM 集成</text>
  
  <!-- Arrow 1 -->
  <line x1="190" y1="105" x2="210" y2="105" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Part 2 -->
  <rect x="220" y="50" width="150" height="110" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="295" y="70" text-anchor="middle" font-size="12" font-weight="bold" fill="#166534">Part 2</text>
  <text x="295" y="88" text-anchor="middle" font-size="10" fill="#166534">能力扩展</text>
  <text x="295" y="108" text-anchor="middle" font-size="9" fill="#64748b">Step 6-11</text>
  <text x="295" y="125" text-anchor="middle" font-size="9" fill="#64748b">工具系统</text>
  <text x="295" y="140" text-anchor="middle" font-size="9" fill="#64748b">RAG 检索</text>
  <text x="295" y="155" text-anchor="middle" font-size="9" fill="#64748b">多 Agent</text>
  
  <!-- Arrow 2 -->
  <line x1="380" y1="105" x2="400" y2="105" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Part 3 -->
  <rect x="410" y="50" width="150" height="110" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="485" y="70" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">Part 3</text>
  <text x="485" y="88" text-anchor="middle" font-size="10" fill="#92400e">产品化</text>
  <text x="485" y="108" text-anchor="middle" font-size="9" fill="#64748b">Step 13-17</text>
  <text x="485" y="125" text-anchor="middle" font-size="9" fill="#64748b">监控告警</text>
  <text x="485" y="140" text-anchor="middle" font-size="9" fill="#64748b">容器化</text>
  <text x="485" y="155" text-anchor="middle" font-size="9" fill="#64748b">状态记忆</text>
  
  <!-- Arrow 3 -->
  <line x1="570" y1="105" x2="590" y2="105" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Part 4 -->
  <rect x="600" y="50" width="130" height="110" rx="8" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
  <text x="665" y="70" text-anchor="middle" font-size="12" font-weight="bold" fill="#9d174d">Part 4</text>
  <text x="665" y="88" text-anchor="middle" font-size="10" fill="#9d174d">项目实战</text>
  <text x="665" y="108" text-anchor="middle" font-size="9" fill="#64748b">Step 18-21</text>
  <text x="665" y="128" text-anchor="middle" font-size="9" fill="#64748b">SmartSupport</text>
  <text x="665" y="145" text-anchor="middle" font-size="9" fill="#64748b">智能客服 SaaS</text>
  
  <!-- Code Lines -->
  <text x="105" y="185" text-anchor="middle" font-size="10" fill="#3b82f6" font-weight="bold">89 → 450 行</text>
  <text x="295" y="185" text-anchor="middle" font-size="10" fill="#22c55e" font-weight="bold">550 → 850 行</text>
  <text x="485" y="185" text-anchor="middle" font-size="10" fill="#f59e0b" font-weight="bold">950 → 1300 行</text>
  <text x="665" y="185" text-anchor="middle" font-size="10" fill="#ec4899" font-weight="bold">2000+ 行</text>
  
  <!-- Arrow Marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>